<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Timebox</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0b;--bg2:#0f1210;--bg3:#141a16;
  --border:#1a2e22;--border2:#223a2b;
  --accent:#1D9E75;--accent2:#5DCAA5;--accent3:#0F6E56;
  --text:#c8d8cc;--text2:#7a9a85;--text3:#3d5a47;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(29,158,117,.04) 39px,rgba(29,158,117,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(29,158,117,.03) 39px,rgba(29,158,117,.03) 40px);pointer-events:none;z-index:0}
.scan-line{position:fixed;top:0;left:0;width:100%;height:2px;background:rgba(29,158,117,.12);animation:scan 10s linear infinite;pointer-events:none;z-index:999}
@keyframes scan{0%{top:-2px}100%{top:100vh}}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}

/* TOP BAR */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.sys-id{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--accent);display:flex;align-items:center;gap:8px}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sys-date{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;text-align:right;line-height:1.6}
.settings-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;padding:4px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;transition:border-color .2s,color .2s;margin-left:12px}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}

/* RINGS */
.rings-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.ring-cell{display:flex;flex-direction:column;align-items:center;gap:10px;padding:1.25rem 1rem;border:1px solid var(--border);border-radius:12px;background:var(--bg2);position:relative;overflow:hidden}
.ring-cell::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(29,158,117,.04) 0%,transparent 60%);pointer-events:none}
.ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-wrap svg{width:88px;height:88px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:2.5}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 4px rgba(29,158,117,.5))}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-count{font-size:22px;font-weight:500;color:var(--text);font-family:var(--mono);line-height:1}
.ring-denom{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ring-label{font-size:9px;letter-spacing:.2em;color:var(--text3);font-family:var(--mono)}

/* ROUTINE TILES */
.routine-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.r-tile{border:1px solid var(--border);border-radius:10px;padding:.6rem .75rem;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:8px;background:var(--bg2)}
.r-tile:hover{border-color:var(--border2)}
.r-tile.on{border-color:var(--accent);background:rgba(29,158,117,.07)}
.r-tile.on .r-icon,.r-tile.on .r-st{color:var(--accent)}
.r-icon{font-size:16px;color:var(--text3);flex-shrink:0;transition:color .2s}
.r-name{font-size:11px;color:var(--text);line-height:1.3}
.r-st{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}

/* PANELS */
.main-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.5fr);gap:12px}
.panel{border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;background:var(--bg2)}
.ph{font-size:9px;letter-spacing:.18em;color:var(--accent);font-family:var(--mono);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ph-sub{color:var(--text3);font-size:9px}
.ph-add{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;transition:color .2s;line-height:1}
.ph-add:hover{color:var(--accent)}

/* INPUTS */
.prio-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prio-n{font-size:10px;font-family:var(--mono);color:var(--accent3);min-width:18px}
input.fi{font-family:var(--sans);font-size:13px;color:var(--text);background:transparent;border:none;border-bottom:1px solid var(--border);padding:3px 0;outline:none;width:100%}
input.fi:focus{border-bottom-color:var(--accent)}
input.fi::placeholder{color:var(--text3)}
input.fi.done{text-decoration:line-through;color:var(--text3)}

.check-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.check-row .del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0}
.check-row:hover .del-btn{opacity:1}
.check-row .del-btn:hover{color:#E05555}
input[type=checkbox].jcb{width:13px;height:13px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}

/* SCHEDULE */
.sched-row{display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);min-height:31px}
.sched-row:last-child{border-bottom:none}
.sched-row.done-row{background:rgba(29,158,117,.05);border-radius:4px}
input[type=checkbox].scb{width:11px;height:11px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;margin-left:2px}
.stime{font-size:9px;color:var(--text3);font-family:var(--mono);min-width:36px;flex-shrink:0}
input.si{font-family:var(--sans);font-size:12px;color:var(--text);background:transparent;border:none;padding:4px 2px;outline:none;flex:1}
input.si::placeholder{color:var(--text3)}
input.si.done{text-decoration:line-through;color:var(--text3)}

/* BRAIN */
input.brain-inp{font-family:var(--sans);font-size:12px;color:var(--text);width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:5px 0;outline:none;margin-bottom:4px;display:block}
input.brain-inp:last-child{border-bottom:none;margin-bottom:0}
input.brain-inp:focus{border-bottom-color:var(--accent)}
input.brain-inp::placeholder{color:var(--text3)}

/* ACTION BAR */
.act-bar{display:flex;gap:10px;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap}
.jbtn{font-size:10px;padding:6px 13px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--mono);letter-spacing:.06em;transition:border-color .2s,color .2s}
.jbtn:hover{border-color:var(--accent);color:var(--accent)}
.jmsg{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* SETTINGS MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;width:min(560px,92vw);max-height:80vh;overflow-y:auto;position:relative}
.modal-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--accent);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.modal-section{margin-bottom:1.25rem}
.modal-section-label{font-size:10px;letter-spacing:.12em;color:var(--text3);font-family:var(--mono);margin-bottom:10px}
.config-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.config-row input{flex:1;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none}
.config-row input:focus{border-color:var(--accent)}
.config-row input::placeholder{color:var(--text3)}
.icon-sel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:13px;width:80px;font-family:var(--mono)}
.del-row-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;flex-shrink:0;transition:color .15s}
.del-row-btn:hover{color:#E05555}
.add-row-btn{font-size:10px;padding:5px 11px;border:1px dashed var(--border2);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;font-family:var(--mono);letter-spacing:.06em;transition:border-color .2s,color .2s;margin-top:4px}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-save{font-size:10px;padding:7px 16px;border:1px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);cursor:pointer;font-family:var(--mono);letter-spacing:.06em;transition:background .2s,color .2s}
.modal-save:hover{background:var(--accent);color:var(--bg)}
</style>
</head>
<body>
<div class="scan-line"></div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()"><i class="ti ti-x"></i></button>
    <div class="modal-title">// SYSTEM CONFIGURATION</div>

    <div class="modal-section">
      <div class="modal-section-label">ROUTINE ITEMS</div>
      <div id="cfg-routine"></div>
      <button class="add-row-btn" onclick="addCfgRoutine()">+ add routine</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">GOALS OF THE DAY (defaults)</div>
      <div id="cfg-goals"></div>
      <button class="add-row-btn" onclick="addCfgGoal()">+ add goal</button>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">SCHEDULE — START / END HOUR</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="number" id="cfg-start" min="0" max="23" style="width:70px;font-family:var(--mono);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" placeholder="5">
        <span style="color:var(--text3);font-family:var(--mono);font-size:12px">→</span>
        <input type="number" id="cfg-end" min="0" max="23" style="width:70px;font-family:var(--mono);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" placeholder="22">
      </div>
    </div>

    <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;gap:10px">
      <button class="modal-save" onclick="saveSettings()">apply_config()</button>
      <button class="jbtn" onclick="closeSettings()">cancel()</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="top-bar">
    <div class="sys-id"><span class="sys-dot"></span>// DAILY OPERATIONS</div>
    <div style="display:flex;align-items:center;gap:0">
      <div class="sys-date" id="top-date"></div>
      <button class="settings-btn" onclick="openSettings()"><i class="ti ti-settings"></i> config</button>
    </div>
  </div>

  <div class="rings-row">
    <div class="ring-cell">
      <div class="ring-wrap"><svg viewBox="0 0 88 88"><circle class="ring-bg" cx="44" cy="44" r="38"/><circle class="ring-fg" id="ring-r" cx="44" cy="44" r="38" stroke-dasharray="238.8" stroke-dashoffset="238.8"/></svg>
        <div class="ring-num"><span class="ring-count" id="rn-r">0</span><span class="ring-denom" id="rd-r">/0</span></div>
      </div>
      <span class="ring-label">ROUTINE</span>
    </div>
    <div class="ring-cell">
      <div class="ring-wrap"><svg viewBox="0 0 88 88"><circle class="ring-bg" cx="44" cy="44" r="38"/><circle class="ring-fg" id="ring-g" cx="44" cy="44" r="38" stroke-dasharray="238.8" stroke-dashoffset="238.8"/></svg>
        <div class="ring-num"><span class="ring-count" id="rn-g">0</span><span class="ring-denom" id="rd-g">/0</span></div>
      </div>
      <span class="ring-label">GOALS</span>
    </div>
    <div class="ring-cell">
      <div class="ring-wrap"><svg viewBox="0 0 88 88"><circle class="ring-bg" cx="44" cy="44" r="38"/><circle class="ring-fg" id="ring-s" cx="44" cy="44" r="38" stroke-dasharray="238.8" stroke-dashoffset="238.8"/></svg>
        <div class="ring-num"><span class="ring-count" id="rn-s">0</span><span class="ring-denom" id="rd-s">/—</span></div>
      </div>
      <span class="ring-label">SCHEDULE</span>
    </div>
  </div>

  <div class="routine-grid" id="routine-grid"></div>

  <div class="main-grid">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="panel">
        <div class="ph">PRIORITIES</div>
        <div class="prio-row"><span class="prio-n">01</span><input class="fi" placeholder="Primäres Ziel…" id="p1"></div>
        <div class="prio-row"><span class="prio-n">02</span><input class="fi" placeholder="" id="p2"></div>
        <div class="prio-row"><span class="prio-n">03</span><input class="fi" placeholder="" id="p3"></div>
      </div>
      <div class="panel">
        <div class="ph">
          <span>GOALS OF THE DAY</span>
          <button class="ph-add" onclick="addGoalRow()" title="add goal">+</button>
        </div>
        <div id="goals-list"></div>
      </div>
      <div class="panel">
        <div class="ph">BRAIN DUMP</div>
        <input class="brain-inp" placeholder="> input…" id="b1">
        <input class="brain-inp" placeholder="" id="b2">
        <input class="brain-inp" placeholder="" id="b3">
        <input class="brain-inp" placeholder="" id="b4">
        <input class="brain-inp" placeholder="" id="b5">
      </div>
    </div>
    <div class="panel" style="display:flex;flex-direction:column">
      <div class="ph"><span>SCHEDULE</span><span class="ph-sub" id="sched-label">0 done</span></div>
      <div id="sched-rows" style="flex:1"></div>
    </div>
  </div>

  <div class="act-bar">
    <button class="jbtn" onclick="saveDay()">save_day()</button>
    <button class="jbtn" onclick="loadDay()">load_day()</button>
    <button class="jbtn" onclick="resetDay()">reset_day()</button>
    <span class="jmsg" id="jmsg"></span>
  </div>
</div>

<script>
const CIRC=238.8;
const DAYS_DE=['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS_DE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

// DEFAULT CONFIG
const DEFAULT_CONFIG={
  routine:[
    {icon:'ti-run',name:'10k Steps'},
    {icon:'ti-book',name:'15 S. lesen'},
    {icon:'ti-brain',name:'10 min Medi'},
    {icon:'ti-focus',name:'1h Deep Work'}
  ],
  goals:['Training / Hyrox','Lernen','Diplomarbeit','Haushalt','Vorlesung'],
  schedStart:5,
  schedEnd:22
};

let config=JSON.parse(localStorage.getItem('jv_config')||'null')||JSON.parse(JSON.stringify(DEFAULT_CONFIG));
let rState=[];
let goalRows=0;

function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function hours(){
  const h=[];for(let i=config.schedStart;i<=config.schedEnd;i++)h.push(String(i).padStart(2,'0')+':00');
  return h;
}

// CLOCK & DATE
function updateClock(){
  const n=new Date();
  const day=DAYS_DE[n.getDay()];
  const date=n.getDate()+'. '+MONTHS_DE[n.getMonth()]+' '+n.getFullYear();
  const time=n.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('top-date').innerHTML=date+' — '+day+'<br>'+time;
}
setInterval(updateClock,1000);updateClock();

function setRing(id,done,total){
  const el=document.getElementById('ring-'+id);
  if(!el)return;
  el.style.strokeDashoffset=total>0?(CIRC*(1-done/total)).toFixed(1):CIRC;
}

// BUILD ROUTINE
function buildRoutine(){
  rState=config.routine.map(()=>false);
  const g=document.getElementById('routine-grid');
  g.innerHTML='';
  // dynamic columns
  const n=config.routine.length;
  g.style.gridTemplateColumns=`repeat(${Math.min(n,4)},1fr)`;
  config.routine.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='r-tile';d.id='rt'+i;d.onclick=()=>toggleR(i);
    d.innerHTML=`<i class="ti ${r.icon} r-icon"></i><div><div class="r-name">${r.name}</div><div class="r-st" id="rs${i}">standby</div></div>`;
    g.appendChild(d);
  });
  document.getElementById('rd-r').textContent='/'+config.routine.length;
  update();
}

function toggleR(i){
  rState[i]=!rState[i];
  document.getElementById('rt'+i).classList.toggle('on',rState[i]);
  document.getElementById('rs'+i).textContent=rState[i]?'complete':'standby';
  update();
}

// BUILD GOALS
function buildGoals(preloaded){
  const c=document.getElementById('goals-list');
  c.innerHTML='';goalRows=0;
  const items=preloaded||config.goals.map(l=>({t:l,done:false}));
  items.forEach(item=>addGoalRow(item.t,item.done));
}

function addGoalRow(text='',done=false){
  const c=document.getElementById('goals-list');
  const i=goalRows++;
  const row=document.createElement('div');
  row.className='check-row';row.id='gr'+i;
  row.innerHTML=`<input type="checkbox" class="jcb" id="gc${i}" onchange="toggleGoal(${i})"><input class="fi" id="gi${i}" value="${text}" placeholder="+ goal…"><button class="del-btn" onclick="delGoalRow(${i})" title="remove">×</button>`;
  c.appendChild(row);
  if(done){document.getElementById('gc'+i).checked=true;document.getElementById('gi'+i).classList.add('done');}
  update();
}

function delGoalRow(i){
  document.getElementById('gr'+i)?.remove();
  update();
}

function toggleGoal(i){
  const cb=document.getElementById('gc'+i);
  document.getElementById('gi'+i)?.classList.toggle('done',cb.checked);
  update();
}

// BUILD SCHEDULE
function buildSched(preloaded){
  const c=document.getElementById('sched-rows');
  c.innerHTML='';
  hours().forEach(h=>{
    const pre=preloaded?.[h]||{t:'',done:false};
    const row=document.createElement('div');
    row.className='sched-row'+(pre.done?' done-row':'');row.id='sr-'+h;
    row.innerHTML=`<input type="checkbox" class="scb" data-h="${h}" ${pre.done?'checked':''}  onchange="toggleSched('${h}')"><span class="stime">${h}</span><input class="si ${pre.done?'done':''}" id="si-${h}" value="${pre.t||''}" placeholder="…" oninput="update()">`;
    c.appendChild(row);
  });
  update();
}

function toggleSched(h){
  const cb=document.querySelector(`.scb[data-h="${h}"]`);
  const inp=document.getElementById('si-'+h);
  const row=document.getElementById('sr-'+h);
  inp.classList.toggle('done',cb.checked);
  row.classList.toggle('done-row',cb.checked);
  update();
}

// UPDATE RINGS
function update(){
  const rDone=rState.filter(Boolean).length;
  const rTotal=config.routine.length;

  const allGoals=[...document.querySelectorAll('[id^="gi"]')].map(inp=>({val:inp.value.trim(),done:document.getElementById('gc'+inp.id.slice(2))?.checked||false})).filter(x=>x.val);
  const gDone=allGoals.filter(x=>x.done).length;
  const gTotal=allGoals.length||config.goals.length;

  const allSched=hours().map(h=>({val:document.getElementById('si-'+h)?.value?.trim()||'',done:document.querySelector(`.scb[data-h="${h}"]`)?.checked||false})).filter(x=>x.val);
  const sDone=allSched.filter(x=>x.done).length;
  const sTotal=allSched.length;

  document.getElementById('rn-r').textContent=rDone;
  document.getElementById('rd-r').textContent='/'+rTotal;
  document.getElementById('rn-g').textContent=gDone;
  document.getElementById('rd-g').textContent='/'+gTotal;
  document.getElementById('rn-s').textContent=sDone;
  document.getElementById('rd-s').textContent='/'+(sTotal||'—');
  document.getElementById('sched-label').textContent=sDone+' done';

  setRing('r',rDone,rTotal);
  setRing('g',gDone,gTotal);
  setRing('s',sDone,Math.max(sTotal,1));
}

// SAVE / LOAD / RESET
function saveDay(){
  try{
    const d={
      prios:['p1','p2','p3'].map(id=>document.getElementById(id).value),
      goals:[...document.querySelectorAll('[id^="gi"]')].map(inp=>({t:inp.value,done:document.getElementById('gc'+inp.id.slice(2))?.checked||false})),
      sched:{},brain:[],routine:[...rState]
    };
    hours().forEach(h=>{d.sched[h]={t:document.getElementById('si-'+h)?.value||'',done:document.querySelector(`.scb[data-h="${h}"]`)?.checked||false}});
    for(let i=1;i<=5;i++)d.brain.push(document.getElementById('b'+i)?.value||'');
    localStorage.setItem('jv_day_'+todayKey(),JSON.stringify(d));
    msg('saved ✓');
  }catch(e){msg('error');}
}

function loadDay(){
  try{
    const raw=localStorage.getItem('jv_day_'+todayKey());
    if(!raw){msg('no save for today');return;}
    const d=JSON.parse(raw);
    ['p1','p2','p3'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=d.prios?.[i]||'';});
    buildGoals(d.goals||[]);
    buildSched(d.sched||{});
    for(let i=1;i<=5;i++){const el=document.getElementById('b'+i);if(el)el.value=d.brain?.[i-1]||'';}
    d.routine?.forEach((v,i)=>{if(i<rState.length){rState[i]=v;document.getElementById('rt'+i)?.classList.toggle('on',v);const rs=document.getElementById('rs'+i);if(rs)rs.textContent=v?'complete':'standby';}});
    update();msg('loaded ✓');
  }catch(e){msg('load error');}
}

function resetDay(){
  if(!confirm('Tag zurücksetzen?'))return;
  localStorage.removeItem('jv_day_'+todayKey());
  rState=config.routine.map(()=>false);
  config.routine.forEach((_,i)=>{document.getElementById('rt'+i)?.classList.remove('on');const rs=document.getElementById('rs'+i);if(rs)rs.textContent='standby';});
  ['p1','p2','p3'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  buildGoals();buildSched();
  for(let i=1;i<=5;i++){const el=document.getElementById('b'+i);if(el)el.value='';}
  update();msg('reset ✓');
}

// SETTINGS
function openSettings(){
  // populate routine
  const rc=document.getElementById('cfg-routine');rc.innerHTML='';
  config.routine.forEach((r,i)=>{
    const row=document.createElement('div');row.className='config-row';
    row.innerHTML=`<input type="text" value="${r.icon}" placeholder="ti-run" style="width:100px;font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-ri-${i}"><input type="text" value="${r.name}" placeholder="Label" style="flex:1;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-rn-${i}"><button class="del-row-btn" onclick="this.closest('.config-row').remove()">×</button>`;
    rc.appendChild(row);
  });
  // populate goals
  const gc=document.getElementById('cfg-goals');gc.innerHTML='';
  config.goals.forEach((g,i)=>{
    const row=document.createElement('div');row.className='config-row';
    row.innerHTML=`<input type="text" value="${g}" placeholder="Goal…" style="flex:1;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-g-${i}"><button class="del-row-btn" onclick="this.closest('.config-row').remove()">×</button>`;
    gc.appendChild(row);
  });
  document.getElementById('cfg-start').value=config.schedStart;
  document.getElementById('cfg-end').value=config.schedEnd;
  document.getElementById('modal').classList.add('open');
}

function closeSettings(){document.getElementById('modal').classList.remove('open');}

function addCfgRoutine(){
  const rc=document.getElementById('cfg-routine');
  const i=rc.children.length;
  const row=document.createElement('div');row.className='config-row';
  row.innerHTML=`<input type="text" placeholder="ti-star" style="width:100px;font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-ri-${i}"><input type="text" placeholder="Name" style="flex:1;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-rn-${i}"><button class="del-row-btn" onclick="this.closest('.config-row').remove()">×</button>`;
  rc.appendChild(row);
}

function addCfgGoal(){
  const gc=document.getElementById('cfg-goals');
  const i=gc.children.length;
  const row=document.createElement('div');row.className='config-row';
  row.innerHTML=`<input type="text" placeholder="Goal…" style="flex:1;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;outline:none" id="cfg-g-${i}"><button class="del-row-btn" onclick="this.closest('.config-row').remove()">×</button>`;
  gc.appendChild(row);
}

function saveSettings(){
  const rc=document.getElementById('cfg-routine').querySelectorAll('.config-row');
  const newRoutine=[...rc].map((row,i)=>({icon:row.querySelector('[id^="cfg-ri"]')?.value||'ti-star',name:row.querySelector('[id^="cfg-rn"]')?.value||'Item'}));
  const gc=document.getElementById('cfg-goals').querySelectorAll('.config-row');
  const newGoals=[...gc].map(row=>row.querySelector('input[type=text]')?.value||'').filter(Boolean);
  const s=parseInt(document.getElementById('cfg-start').value)||5;
  const e=parseInt(document.getElementById('cfg-end').value)||22;
  config={routine:newRoutine,goals:newGoals,schedStart:Math.min(s,e),schedEnd:Math.max(s,e)};
  localStorage.setItem('jv_config',JSON.stringify(config));
  closeSettings();
  buildRoutine();buildGoals();buildSched();
  msg('config saved ✓');
}

function msg(t){const el=document.getElementById('jmsg');el.textContent='> '+t;setTimeout(()=>el.textContent='',3000);}

// INIT
buildRoutine();buildGoals();buildSched();
// auto-load today if save exists
if(localStorage.getItem('jv_day_'+todayKey()))loadDay();
</script>
</body>
